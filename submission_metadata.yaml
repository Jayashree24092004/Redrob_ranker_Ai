ai_usage_summary: |
  Used Claude (Anthropic) to design and implement the full ranking pipeline
  (feature engineering, TF-IDF semantic matching, risk/honeypot detection,
  hybrid scoring, explanation generation) based on a close reading of
  job_description.docx, submission_spec.docx, redrob_signals_doc.docx, and
  candidate_schema.json. No candidate data was sent to any external LLM API —
  all scoring logic runs locally and deterministically.

methodology_summary: |
  Rule-based + TF-IDF hybrid ranker, no LLM calls during ranking. JD blueprint
  hand-extracted into required/preferred skill terms and explicit
  disqualifiers. Per-candidate features: TF-IDF cosine similarity (semantic),
  exact skill-term coverage discounted by an endorsement-and-duration trust
  multiplier (catches keyword-stuffing without substantiated skill use),
  experience-band fit, career trajectory, education, assessment scores, and
  22 of the 23 Redrob behavioral signals split into recent activity/
  responsiveness, profile credibility (completeness, tenure, connections,
  endorsements, offer-acceptance history), and role-specific availability
  fit (work-mode match, relocation willingness, application-volume sanity
  check). Risk detection separates hard honeypot exclusion (multiple
  "expert" skills with ~0 months use, timeline impossibilities) from a soft
  risk penalty for the JD's explicit disqualifiers (research-only
  background, shallow recent LangChain-only AI experience, no-recent-coding
  architects, consulting-only careers, CV/speech background with no NLP
  overlap, title-chasing). Hybrid weighted score combines all of the above;
  ties broken by candidate_id. Runtime: ~70 seconds for 100K candidates on
  1 CPU core, <1GB RAM.

declarations:
